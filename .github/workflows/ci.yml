name: ci

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    # npm Trusted Publishing: auth is the GitHub OIDC token (id-token: write).
    # Requires npm >= 11.5.1 and NO NODE_AUTH_TOKEN (a configured token
    # preempts the OIDC exchange).
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Prerelease tags (anything with a '-') publish under the `alpha`
      # dist-tag; stable tags publish as `latest`.
      - run: |
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            NPM_TAG="alpha"
          else
            NPM_TAG="latest"
          fi
          npm publish --access public --provenance --tag "$NPM_TAG"
