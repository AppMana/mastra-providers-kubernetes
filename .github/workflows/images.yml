name: images

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - ".github/workflows/images.yml"
    tags:
      - "images-v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  workspace-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/appmana/workspace-base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=match,pattern=images-v(\d+\.\d+\.\d+),group=1
      - uses: docker/build-push-action@v6
        with:
          context: images/workspace-base
          file: images/workspace-base/linux.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=workspace-base
          cache-to: type=gha,scope=workspace-base,mode=max

  workspace-cuda:
    runs-on: ubuntu-latest
    needs: workspace-base
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/appmana/workspace-cuda
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=match,pattern=images-v(\d+\.\d+\.\d+),group=1
      - uses: docker/build-push-action@v6
        with:
          context: images/workspace-cuda
          file: images/workspace-cuda/linux.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/appmana/workspace-base:latest
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=workspace-cuda
          cache-to: type=gha,scope=workspace-cuda,mode=max
